<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->

    <!-- Title and Description -->
    <title>Shareiar Islam | Full-Stack Developer Portfolio</title>
    <meta name="description" content="Hi, I'm Shareiar Islam, a Full-Stack MERN developer specializing in React, Node.js, and MongoDB. Explore my projects, skills, and professional experience." />

    <!-- Author and Keywords -->
    <meta name="author" content="Shareiar Islam" />
    <meta name="keywords" content="Shareiar Islam, portfolio, full-stack developer, MERN stack, React, Node.js, MongoDB, Express, web developer, JavaScript" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/assets/favicon.ico" />

    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/assets/apple-touch-icon.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://shareiarislam.vercel.app" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Shareiar Islam | Full-Stack Developer Portfolio" />
    <meta property="og:description" content="Hi, I'm Shareiar Islam, a Full-Stack MERN developer. Explore my projects, skills, and professional experience." />
    <meta property="og:image" content="https://shareiarislam.vercel.app/assets/android-chrome-192x192.png" />
    <meta property="og:url" content="https://shareiarislam.vercel.app" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Shareiar Islam Portfolio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shareiar Islam | Full-Stack Developer Portfolio" />
    <meta name="twitter:description" content="Hi, I'm Shareiar Islam, a Full-Stack MERN developer. Explore my projects, skills, and professional experience." />
    <meta name="twitter:image" content="https://shareiarislam.vercel.app/assets/android-chrome-192x192.png" />
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
